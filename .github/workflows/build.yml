name: Build Windows + Linux + Android

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm install

      - name: Build Tauri app (Windows)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'Zen des Tages v__VERSION__'
          releaseBody: 'Windows, Linux & Android Build der Zen des Tages App'
          releaseDraft: false
          prerelease: false

  build-linux:
    runs-on: ubuntu-22.04
    needs: build-windows
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm \
            libssl-dev \
            libdbus-1-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm install

      - name: Read version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version' src-tauri/Cargo.toml | head -1 | sed 's/.*= *"\(.*\)"/\1/')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "TAG=v$VERSION" >> $GITHUB_ENV

      - name: Build Tauri app (Linux — AppImage + deb + rpm)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v${{ env.VERSION }}
          releaseName: 'Zen des Tages v${{ env.VERSION }}'
          releaseBody: 'Windows, Linux & Android Build der Zen des Tages App'
          releaseDraft: false
          prerelease: false
          args: --bundles deb,rpm

  build-portable:
    runs-on: windows-latest
    needs: build-windows
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm install

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $version = (Get-Content src-tauri/Cargo.toml | Select-String '^version').ToString().Split('"')[1]
          echo "VERSION=$version" >> $env:GITHUB_ENV

      - name: Build portable binary
        working-directory: src-tauri
        run: cargo build --release

      - name: Create portable ZIP
        shell: pwsh
        run: |
          $exePath = "src-tauri\target\release\zen-des-tages.exe"
          $zipName = "Zen.des.Tages_${{ env.VERSION }}_x64-portable.zip"
          Compress-Archive -Path $exePath -DestinationPath $zipName
          echo "Created $zipName"

      - name: Upload portable ZIP to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: gh release upload "v${{ env.VERSION }}" "Zen.des.Tages_${{ env.VERSION }}_x64-portable.zip" --clobber

  build-android:
    runs-on: ubuntu-22.04
    needs: build-windows
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK and build-tools
        run: |
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "ndk;27.0.12077973" \
            "build-tools;34.0.0"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Android Rust targets (ARM only — real devices)
        run: |
          rustup target add aarch64-linux-android
          rustup target add armv7-linux-androideabi

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm install

      - name: Initialize Tauri Android project
        run: npx tauri android init

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 --decode > $RUNNER_TEMP/zen-des-tages.keystore

      - name: Build Android APK (release)
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
        run: npx tauri android build --apk

      - name: Read version and sign APK
        run: |
          VERSION=$(grep '^version' src-tauri/Cargo.toml | head -1 | sed 's/.*= *"\(.*\)"/\1/')
          echo "VERSION=$VERSION" >> $GITHUB_ENV

          # Find release APK specifically
          APK=$(find src-tauri/gen/android/app/build/outputs/apk/release -name "*.apk" 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            APK=$(find src-tauri/gen/android -name "*.apk" | grep -v debug | head -1)
          fi
          echo "Found APK: $APK"

          BUILD_TOOLS="$ANDROID_SDK_ROOT/build-tools/34.0.0"

          # Zipalign
          $BUILD_TOOLS/zipalign -v 4 "$APK" app-aligned.apk

          # Sign
          $BUILD_TOOLS/apksigner sign \
            --ks $RUNNER_TEMP/zen-des-tages.keystore \
            --ks-key-alias ${{ secrets.ANDROID_KEY_ALIAS }} \
            --ks-pass pass:${{ secrets.ANDROID_STORE_PASSWORD }} \
            --key-pass pass:${{ secrets.ANDROID_KEY_PASSWORD }} \
            --out ZenDesTages_${VERSION}_android.apk \
            app-aligned.apk

          echo "APK_FILE=ZenDesTages_${VERSION}_android.apk" >> $GITHUB_ENV
          ls -lh ZenDesTages_${VERSION}_android.apk

      - name: Upload APK to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload v${{ env.VERSION }} ${{ env.APK_FILE }} --clobber
